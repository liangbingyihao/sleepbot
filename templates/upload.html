<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>给好友的鼓励</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f8f9ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 20px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    padding: 32px 24px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-family: SF Arabic, SF Arabic;
    font-weight: bold;
    font-size: 24px;
    color: #333333;
    line-height: 33px;
    text-align: center;
    font-style: normal;
    text-transform: none;
    margin-bottom: 12px;
  }
  p.desc {
    font-family: SF Arabic, SF Arabic;
    font-weight: 400;
    font-size: 14px;
    color: #333333;
    line-height: 20px;
    text-align: center;
    font-style: normal;
    text-transform: none;
    margin-bottom: 30px;
  }
  .expired-icon { font-size: 48px; color: #ccc; margin-bottom: 16px; }
  .expired-text { color: #999; font-size: 15px; }
  .loading { color: #999; font-size: 15px; padding: 40px 0; }
  .form-group { margin-bottom: 24px; text-align: left; }
  label {
    display: block;
    font-family: SF Arabic, SF Arabic;
    font-weight: 400;
    font-size: 14px;
    color: #333333;
    line-height: 20px;
    text-align: left;
    font-style: normal;
    text-transform: none;
    margin-bottom: 12px;
  }
  input[type=text], textarea {
    width: 100%;
    padding: 20px;
    border: none;
    background-color: #f8f9ff;
    border-radius: 16px;
    font-size: 18px;
    outline: none;
    transition: all 0.2s;
    color: #666;
  }
  input[type=text]::placeholder,
  textarea::placeholder {
    font-family: SF Arabic, SF Arabic;
    font-weight: 400;
    font-size: 14px;
    color: #7B7B7B;
    line-height: 20px;
    text-align: left;
    font-style: normal;
    text-transform: none;
  }
  input[type=text]:focus, textarea:focus {
    box-shadow: 0 0 0 2px #6c7bff;
  }
  textarea { resize: none; min-height: 180px; }
  .type-selector { display: flex; gap: 16px; margin: 24px 0; }
  .type-btn {
    flex: 1;
    padding: 20px;
    border-radius: 16px;
    border: none;
    background: #f8f9ff;
    cursor: pointer;
    font-family: SF Arabic, SF Arabic;
    font-weight: 400;
    font-size: 14px;
    color: #333333;
    line-height: 20px;
    text-align: left;
    font-style: normal;
    text-transform: none;
    transition: all 0.2s;
    /* 图标+文字居中 */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  /* 隐藏图片标签 */
  .type-btn[data-type="image"] {
    display: none;
  }
  .type-btn:hover { opacity: 0.9; }
  .type-btn.active {
    border: 2px solid #6c7bff;
    background: #fff;
    font-family: SF Arabic, SF Arabic;
    font-weight: 400;
    font-size: 14px;
    color: #6574FB;
    line-height: 20px;
    text-align: left;
    font-style: normal;
    text-transform: none;
  }
  .file-input { display: none; }
  .file-label {
    display: block;
    padding: 20px;
    border: 2px dashed #ddd;
    border-radius: 16px;
    cursor: pointer;
    color: #999;
    font-size: 18px;
    transition: all 0.2s;
    background: #f8f9ff;
  }
  .file-label:hover { border-color: #6c7bff; color: #6c7bff; }
  .file-label.has-file {
    border-color: #6c7bff;
    background: #eef1ff;
    color: #6c7bff;
  }
  .submit-btn {
    display: block;
    width: 291px;
    height: 39px;
    max-width: 100%;
    margin: 8px auto 0;
    border: none;
    border-radius: 30px;
    background: linear-gradient(136deg, #5F75FA 0%, #B972FF 100%);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 1; }
  .msg { margin-top: 16px; padding: 12px; border-radius: 16px; font-size: 14px; display: none; }
  .msg.success { display: block; background: #e6f7e6; color: #2e7d32; }
  .msg.error { display: block; background: #fdecea; color: #c62828; }

  .recorder-box {
    border: 2px dashed #ddd;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 8px;
    background: #f8f9ff;
  }
  .recorder-box.recording { border-color: #e53935; background: #fff5f5; }
  .recorder-box.has-recording { border-color: #6c7bff; background: #eef1ff; }
  .rec-timer {
    font-size: 28px;
    font-weight: 700;
    color: #333;
    margin: 8px 0;
    font-variant-numeric: tabular-nums;
  }
  .rec-timer.recording { color: #e53935; }
  .rec-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 24px; border: none; border-radius: 24px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .rec-btn-start { background: linear-gradient(136deg, #5F75FA 0%, #B972FF 100%); border-radius: 30px; color: #fff; }
  .rec-btn-start:hover { opacity: 0.85; }
  .rec-btn-stop { background: #8C8C8C; color: #fff; }
  .rec-btn-stop:hover { background: #707070; }
  .rec-btn:disabled { background: #ccc; cursor: not-allowed; }
  .rec-preview { margin-top: 12px; }
  .rec-preview audio { width: 100%; height: 40px; border-radius: 8px; }
  .rec-hint { font-size: 13px; color: #999; margin-top: 8px; }
  .rec-hint.error { color: #c62828; }
  .notice {
    background: transparent;
    border-radius: 16px;
    padding: 14px 16px;
    margin: 16px 0 24px;
    text-align: left;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .notice-icon { font-size: 18px; line-height: 1.4; flex-shrink: 0; color: #6c7bff; }
  .notice-text {
    font-family: SF Arabic, SF Arabic;
    font-weight: 400;
    font-size: 12px;
    color: #7B7B7B;
    line-height: 17px;
    text-align: left;
    font-style: normal;
    text-transform: none;}
  .notice-text strong {
    font-family: SF Arabic, SF Arabic;
    font-weight: 600;
    font-size: 12px;
    color: #333333;
    line-height: 17px;
    text-align: left;
    font-style: normal;
    text-transform: none;
  }
  .notice-privacy {
    font-family: SF Arabic, SF Arabic;
    font-weight: 400;
    font-size: 12px;
    color: #6574FB;
    line-height: 17px;
    text-align: left;
    font-style: normal;
    text-transform: none;
  }
  .gift-bar { text-align: center; margin-top: 24px; }
  .gift-box {
    position: relative;
    width: 400px;
    height: 126px;
    max-width: 100%;
    margin: 0 auto;
    cursor: pointer;
    overflow: hidden;
    border-radius: 12px;
  }
  .gift-box img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .gift-box-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: SF Arabic, SF Arabic;
    font-weight: 600;
    font-size: 16px;
    color: #6574FA;
    line-height: 22px;
    text-align: center;
    font-style: normal;
    text-transform: none;
    white-space: nowrap;
    padding-left: 2.8em;
    pointer-events: none;
  }
  .gift-box:hover { opacity: 0.85; }
  .heading-area { width: 100%; max-width: 480px; text-align: center; }
  /* 名字高亮色统一设计稿主色 */
  #creatorName {
    color: #6574FB !important;
  }
</style>
</head>
<body>
<div class="heading-area">
  <h1>给 <span id="creatorName">好友</span> 的睡前鼓励</h1>
  <p class="desc" data-i18n="pageDesc">你的好友正在努力早睡，送上一份鼓励吧！</p>
</div>
<div class="card" id="app">
  <div id="loading">
    <div class="loading" data-i18n="loading">检查链接状态...</div>
  </div>
  <div id="expired" style="display:none;">
    <div class="expired-icon">&#x23F0;</div>
    <h1 data-i18n="expiredHeading">链接已过期</h1>
    <p class="expired-text" data-i18n="expiredText">该素材收集链接已失效，请联系你的好友重新生成。</p>
  </div>
  <div id="formArea" style="display:none;">

    <form id="uploadForm" enctype="multipart/form-data">
      <div class="form-group">
        <label data-i18n="labelName">你的昵称</label>
        <input type="text" id="friendName" data-i18n="placeholderName" placeholder="请输入你的名字" required>
      </div>

      <div class="type-selector">
        <!-- 图片标签 保留结构仅隐藏 -->
        <button type="button" class="type-btn" data-type="image" data-i18n="tabImage">图片</button>
        <!-- 录音 增加麦克风图标 -->
        <button type="button" class="type-btn active" data-type="audio">
          <img src="https://graceword.oss-cn-hongkong.aliyuncs.com/sleep/static/record%402x.png" style="height:12px;"> <span data-i18n="tabAudio">录音</span>
        </button>
        <!-- 文字 增加文字图标 -->
        <button type="button" class="type-btn" data-type="text">
          <img src="https://graceword.oss-cn-hongkong.aliyuncs.com/sleep/static/text%402x.png" style="height:12px;"> <span data-i18n="tabText">文字</span>
        </button>
      </div>

      <div id="fileSection">
        <label class="file-label" id="fileLabel" for="fileInput">
          <span id="fileText">点击选择图片</span>
        </label>
        <input type="file" class="file-input" id="fileInput" accept="image/*">
      </div>

      <div id="recorderSection" style="display:none;">
        <div class="recorder-box" id="recorderBox">
          <div class="rec-timer" id="recTimer">00:00</div>
          <div>
            <button type="button" class="rec-btn rec-btn-start" id="recStartBtn"><img src="https://graceword.oss-cn-hongkong.aliyuncs.com/sleep/static/icon-mic.webp" style="height:12px;"><span data-i18n="startRecord">开始录音</span></button>
            <button type="button" class="rec-btn rec-btn-stop" id="recStopBtn" style="display:none;">&#x23F9;<span data-i18n="stopRecord">停止</span></button>
          </div>
          <div class="rec-preview" id="recPreview" style="display:none;"></div>
          <div class="rec-hint" id="recHint">点击"开始录音"录制你的鼓励</div>
        </div>
      </div>

      <div id="textSection" style="display:none;">
        <div class="form-group">
          <label data-i18n="labelText">鼓励的话</label>
          <textarea id="textContent" data-i18n="placeholderText" placeholder="写一段话鼓励你的好友吧..."></textarea>
        </div>
      </div>

      <div class="notice">
        <div class="notice-icon"><img src="https://graceword.oss-cn-hongkong.aliyuncs.com/sleep/static/info%402x.png" style="height:12px;"></div>
        <div class="notice-text">
          <strong data-i18n="noticeTitle">内容用途说明</strong><br>
          <span data-i18n="noticeBody">你提交的内容将显示在好友的手机锁屏上，每次解锁都能看到你的鼓励。</span><br>
          <span class="notice-privacy" data-i18n="noticePrivacy">仅你和对方可见，其他任何人无法查看。</span>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn" data-i18n="submitBtn">发送鼓励</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>
</div>

<div class="gift-bar">
  <div class="gift-box" id="giftBtn">
    <img src="https://graceword.oss-cn-hongkong.aliyuncs.com/sleep/static/gift%402x.png" alt="">
    <span class="gift-box-text" data-i18n="giftText">好友送你，7天免费使用礼包</span>
  </div>
</div>

<script>
(function() {
  var _locale = navigator.language.startsWith('zh') ? 'zh' : 'en';
  var _t = (function() {
    var strings = {
      zh: {
        title: '给好友的鼓励',
        pageTitle: '给 <span id="creatorName" style="color:#6574FB;">{name}</span> 的睡前鼓励',
        pageDesc: '你的好友正在努力早睡，送上一份鼓励吧！',
        loading: '检查链接状态...',
        expiredHeading: '链接已过期',
        expiredText: '该素材收集链接已失效，请联系你的好友重新生成。',
        expiredNoSession: '缺少 session_id 参数',
        expiredNetwork: '无法连接到服务器，请稍后重试',
        labelName: '你的昵称',
        placeholderName: '请输入你的名字',
        tabImage: '图片',
        tabAudio: '录音',
        tabText: '文字',
        filePickImage: '点击选择图片',
        filePickAudio: '点击选择录音文件',
        startRecord: '开始录音',
        stopRecord: '停止',
        reRecord: '重新录制',
        hintDefault: '点击"开始录音"录制你的鼓励（最长 {max} 秒）',
        hintRecording: '录音中...（最长 {max} 秒）',
        hintDone: '已录制 {time}，可播放试听',
        hintNoSupport: '您的浏览器不支持录音功能',
        hintGetPermission: '正在获取麦克风权限...',
        hintNoM4a: '您的浏览器不支持 m4a 录音格式',
        hintPermissionDenied: '麦克风权限被拒绝：{msg}',
        labelText: '鼓励的话',
        placeholderText: '写一段话鼓励你的好友吧...',
        noticeTitle: '内容用途说明',
        noticeBody: '你提交的内容将显示在好友的手机锁屏上，每次解锁都能看到你的鼓励。',
        noticePrivacy: '仅你和对方可见，其他任何人无法查看。',
        submitBtn: '发送鼓励',
        giftText: '好友送你，7天免费使用礼包',
        errorTextEmpty: '请输入鼓励的文字内容',
        errorRecordEmpty: '请先录制一段录音',
        errorFileEmpty: '请选择一个文件',
        successMsg: '上传成功！',
        errorUpload: '上传失败，请重试',
        errorServer: '服务器返回异常{status}，请稍后重试',
        errorNetwork: '网络错误，请重试',
        errorSubmit: '提交出错：{msg}',
      },
      en: {
        title: 'Encourage Your Friend',
        pageTitle: 'Goodnight encouragement for <span id="creatorName" style="color:#6574FB;">{name}</span>',
        pageDesc: 'Your friend is working on going to bed early. Send them some encouragement!',
        loading: 'Checking link status...',
        expiredHeading: 'Link Expired',
        expiredText: 'This collection link is no longer valid. Please ask your friend to generate a new one.',
        expiredNoSession: 'Missing session_id parameter',
        expiredNetwork: 'Unable to connect to server. Please try again later.',
        labelName: 'Your Name',
        placeholderName: 'Enter your name',
        tabImage: 'Image',
        tabAudio: 'Audio',
        tabText: 'Text',
        filePickImage: 'Choose an image',
        filePickAudio: 'Choose an audio file',
        startRecord: 'Start Recording',
        stopRecord: 'Stop',
        reRecord: 'Re-record',
        hintDefault: 'Click "Start Recording" to record (max {max}s)',
        hintRecording: 'Recording... (max {max}s)',
        hintDone: 'Recorded {time} — tap to preview',
        hintNoSupport: 'Your browser does not support audio recording',
        hintGetPermission: 'Requesting microphone access...',
        hintNoM4a: 'Your browser does not support m4a recording format',
        hintPermissionDenied: 'Microphone permission denied: {msg}',
        labelText: 'Your Message',
        placeholderText: 'Write something encouraging...',
        noticeTitle: 'How your content is used',
        noticeBody: 'Your submission will appear on your friend\'s phone lock screen. They\'ll see it every time they unlock.',
        noticePrivacy: 'Only you and your friend can see it. No one else has access.',
        submitBtn: 'Send Encouragement',
        giftText: '7-day free gift from your friend',
        errorTextEmpty: 'Please enter your message',
        errorRecordEmpty: 'Please record a message first',
        errorFileEmpty: 'Please select a file',
        successMsg: 'Upload successful!',
        errorUpload: 'Upload failed. Please try again.',
        errorServer: 'Server error{status}. Please try again.',
        errorNetwork: 'Network error. Please try again.',
        errorSubmit: 'Submission error: {msg}',
      },
    };
    var lang = _locale === 'zh' ? strings.zh : strings.en;
    return function(key, data) {
      var s = lang[key];
      if (!s) return key;
      if (!data) return s;
      for (var k in data) s = s.replace('{' + k + '}', data[k]);
      return s;
    };
  })();

  function applyI18n() {
    document.documentElement.lang = _locale === 'zh' ? 'zh-CN' : 'en';
    document.title = _t('title');
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.dataset.i18n;
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
        el.placeholder = _t(key);
      } else {
        el.textContent = _t(key);
      }
    });
    var name = document.getElementById('creatorName').textContent;
    document.querySelector('h1').innerHTML = _t('pageTitle', {name: name});
  }

  var _setHeading = function(name) {
    document.querySelector('h1').innerHTML = _t('pageTitle', {name: name});
  };

  var params = new URLSearchParams(window.location.search);
  var API_BASE = params.get('api_base') || window.location.origin;
  var sessionId = params.get('session_id');
  var loading = document.getElementById('loading');
  var expired = document.getElementById('expired');
  var formArea = document.getElementById('formArea');

  if (!sessionId) {
    loading.style.display = 'none';
    expired.style.display = 'block';
    expired.querySelector('.expired-text').textContent = _t('expiredNoSession');
    return;
  }

  var xhr = new XMLHttpRequest();
  xhr.open('GET', API_BASE + '/api/sleep/assets/friend/session/' + sessionId);
  xhr.onload = function() {
    loading.style.display = 'none';
    var resp = JSON.parse(xhr.responseText);
    if (resp.code === 'OK' && resp.data && !resp.data.expired) {
      formArea.style.display = 'block';
      if (resp.data.creator_name) {
        _setHeading(resp.data.creator_name);
      }
      document.querySelector('.type-btn[data-type="audio"]').click();
    } else {
      expired.style.display = 'block';
    }
  };
  xhr.onerror = function() {
    loading.style.display = 'none';
    expired.style.display = 'block';
    expired.querySelector('.expired-text').textContent = _t('expiredNetwork');
  };
  xhr.send();

  var form = document.getElementById('uploadForm');
  var typeBtns = document.querySelectorAll('.type-btn');
  var fileSection = document.getElementById('fileSection');
  var recorderSection = document.getElementById('recorderSection');
  var textSection = document.getElementById('textSection');
  var fileInput = document.getElementById('fileInput');
  var fileLabel = document.getElementById('fileLabel');
  var fileText = document.getElementById('fileText');
  var msg = document.getElementById('msg');
  var submitBtn = document.getElementById('submitBtn');

  var recStartBtn = document.getElementById('recStartBtn');
  var recStopBtn = document.getElementById('recStopBtn');
  var recTimer = document.getElementById('recTimer');
  var recPreview = document.getElementById('recPreview');
  var recHint = document.getElementById('recHint');
  var recorderBox = document.getElementById('recorderBox');

  var isApple = /iPhone|iPad|iPod|Mac OS|Safari/.test(navigator.userAgent) && !/Chrome|Android/.test(navigator.userAgent);
  var MAX_RECORD_SECONDS = 60;
  applyI18n();
  var mediaRecorder = null;
  var audioChunks = [];
  var recordedBlob = null;
  var timerInterval = null;
  var seconds = 0;

  function getCurrentType() {
    return document.querySelector('.type-btn.active').dataset.type;
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function formatTime(s) {
    var m = String(Math.floor(s / 60)).padStart(2, '0');
    var sec = String(s % 60).padStart(2, '0');
    return m + ':' + sec;
  }

  function resetRecorderUI() {
    recordedBlob = null;
    audioChunks = [];
    recPreview.style.display = 'none';
    recPreview.innerHTML = '';
    recHint.textContent = _t('hintDefault', {max: MAX_RECORD_SECONDS});
    recHint.className = 'rec-hint';
    recTimer.textContent = '00:00';
    recTimer.className = 'rec-timer';
    recorderBox.className = 'recorder-box';
  }

  typeBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      typeBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var t = btn.dataset.type;
      if (t === 'text') {
        fileSection.style.display = 'none';
        recorderSection.style.display = 'none';
        textSection.style.display = 'block';
      } else if (t === 'audio') {
        fileSection.style.display = 'none';
        textSection.style.display = 'none';
        recorderSection.style.display = 'block';
      } else {
        fileSection.style.display = 'block';
        recorderSection.style.display = 'none';
        textSection.style.display = 'none';
        fileInput.accept = 'image/*';
        fileText.textContent = _t('filePickImage');
        fileLabel.classList.remove('has-file');
      }
    });
  });

  fileInput.addEventListener('change', function() {
    if (fileInput.files.length > 0) {
      fileLabel.classList.add('has-file');
      fileText.textContent = fileInput.files[0].name;
    } else {
      fileLabel.classList.remove('has-file');
      fileText.textContent = getCurrentType() === 'image' ? _t('filePickImage') : _t('filePickAudio');
    }
  });

  recStartBtn.addEventListener('click', function() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      recHint.textContent = _t('hintNoSupport');
      recHint.className = 'rec-hint error';
      return;
    }
    recHint.textContent = _t('hintGetPermission');
    recHint.className = 'rec-hint';
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      audioChunks = [];
      seconds = 0;
      recTimer.textContent = '00:00';
      recTimer.className = 'rec-timer recording';
      recorderBox.className = 'recorder-box recording';
      recStartBtn.style.display = 'none';
      recStopBtn.style.display = 'inline-flex';
      recPreview.style.display = 'none';
      recPreview.innerHTML = '';
      recHint.textContent = _t('hintRecording', {max: MAX_RECORD_SECONDS});
      recHint.className = 'rec-hint';

      stopTimer();
      timerInterval = setInterval(function() {
        seconds++;
        recTimer.textContent = formatTime(seconds);
        if (seconds >= MAX_RECORD_SECONDS) {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
          }
          stopTimer();
        }
      }, 1000);

      if (!MediaRecorder.isTypeSupported('audio/mp4')) {
        recHint.textContent = _t('hintNoM4a');
        recHint.className = 'rec-hint error';
        recStartBtn.style.display = 'inline-flex';
        recStartBtn.querySelector('span').textContent = _t('startRecord');
        recStopBtn.style.display = 'none';
        return;
      }
      var mimeType = 'audio/mp4';

      mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType: mimeType }) : new MediaRecorder(stream);
      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      mediaRecorder.onstop = function() {
        stopTimer();
        stream.getTracks().forEach(function(t) { t.stop(); });
        recordedBlob = new Blob(audioChunks, { type: mimeType.split(';')[0] });
        recTimer.className = 'rec-timer';
        recorderBox.className = 'recorder-box has-recording';
        recStartBtn.style.display = 'inline-flex';
        recStartBtn.querySelector('span').textContent = _t('reRecord');
        recStopBtn.style.display = 'none';
        recHint.textContent = _t('hintDone', {time: formatTime(seconds)});
        recHint.className = 'rec-hint';
        recPreview.style.display = 'block';
        var audio = document.createElement('audio');
        audio.controls = true;
        audio.src = URL.createObjectURL(recordedBlob);
        recPreview.appendChild(audio);
      };
      mediaRecorder.start();
    }).catch(function(err) {
      recHint.textContent = _t('hintPermissionDenied', {msg: err.message});
      recHint.className = 'rec-hint error';
    });
  });

  recStopBtn.addEventListener('click', function() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  });

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    msg.className = 'msg';
    msg.style.display = 'none';
    submitBtn.disabled = true;

    try {
      var fd = new FormData();
      fd.append('friend_name', document.getElementById('friendName').value.trim());
      fd.append('type', getCurrentType());

      if (getCurrentType() === 'text') {
        var content = document.getElementById('textContent').value.trim();
        if (!content) {
          showError(_t('errorTextEmpty'));
          submitBtn.disabled = false;
          return;
        }
        fd.append('content', content);
      } else if (getCurrentType() === 'audio') {
        if (!recordedBlob) {
          showError(_t('errorRecordEmpty'));
          submitBtn.disabled = false;
          return;
        }
        var ext = recordedBlob.type.includes('mp4') ? 'm4a' : 'webm';
        var audioFile = new File([recordedBlob], 'recording.' + ext, { type: recordedBlob.type });
        fd.append('file', audioFile);
      } else {
        var file = fileInput.files[0];
        if (!file) {
          showError(_t('errorFileEmpty'));
          submitBtn.disabled = false;
          return;
        }
        fd.append('file', file);
      }

      var xhr2 = new XMLHttpRequest();
      xhr2.open('POST', API_BASE + '/api/sleep/assets/friend/upload/' + sessionId);
      xhr2.onload = function() {
        try {
          var resp = JSON.parse(xhr2.responseText);
          if (xhr2.status === 200) {
            msg.className = 'msg success';
            msg.textContent = resp.data ? resp.data.msg : _t('successMsg');
            msg.style.display = 'block';
            form.reset();
            fileLabel.classList.remove('has-file');
            fileText.textContent = _t('filePickImage');
            document.querySelector('.type-btn[data-type="audio"]').click();
          } else {
            showError(resp.msg || _t('errorUpload'));
          }
        } catch(e) {
          console.error('parse error, status:', xhr2.status, 'body:', xhr2.responseText.slice(0, 200));
          showError(_t('errorServer', {status: xhr2.status ? ' (' + xhr2.status + ')' : ''}));
        }
        submitBtn.disabled = false;
      };
      xhr2.onerror = function() {
        showError(_t('errorNetwork'));
        submitBtn.disabled = false;
      };
      xhr2.send(fd);
    } catch(e) {
      showError(_t('errorSubmit', {msg: e.message}));
      submitBtn.disabled = false;
    }
  });

  function showError(text) {
    msg.className = 'msg error';
    msg.textContent = text;
    msg.style.display = 'block';
  }
})();
</script>
</body>
</html>
